<!DOCTYPE html>
<html>

<head>

    <title>Fruit Click Game</title>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Bootstrap -->
    <link rel="stylesheet" href="bootstrap.min.css">

    <!-- CSS -->
    <link rel="stylesheet" href="style.css">

</head>

<body>

<div class="container-fluid top">

    <div class="row">

        <div class="col-md-3">
            <h3>Fruit Click Game</h3>
        </div>

        <div class="col-md-3">

            <p>Apple : <span id="apple">0</span></p>

            <p>Banana : <span id="banana">0</span></p>

        </div>

        <div class="col-md-2">

            <select id="time" class="form-select">

                <option value="60">1 Minute</option>
                <option value="120">2 Minutes</option>
                <option value="300">5 Minutes</option>

            </select>

        </div>

        <div class="col-md-2">

            <button class="btn btn-success" onclick="startGame()">
                Start Game
            </button>

        </div>

        <div class="col-md-2">

            <h4 id="timer">01:00</h4>

        </div>

    </div>

    <button id="colorBtn" class="btn btn-primary mt-3" onclick="changeColor()">
        Change Background
    </button>

</div>

<div id="game">

    <img src="apple.jpg" id="appleImg" onclick="fruitClick('apple')">

    <img src="banana.jpg" id="bananaImg" onclick="fruitClick('banana')">

</div>
<div>

    <button id="total_click" onclick="sum()">
        Click to Show Total Clicks
    </button>

    <p id="total">Total Clicks : 0</p>

</div>

<script src="script.js"></script>
</body>
</html>
